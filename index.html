    const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbygfswYatsxqiZrZoVDDZzo20XolahNbEyaUg9Zq0wp9jxSt-0ltxyL2nzYirgnoBJ-KQ/exec";

</head>
<body>
  <!-- Loader visivo -->
  <div id="loader-overlay" class="loader-overlay">

      <div class="spinner"></div>

  <h2>Gestione Turni</h2>
  <label>Mese: <input type="number" id="mese" min="1" max="12"></label>
  <label>Anno: <input type="number" id="anno" min="2020" max="2100"></label>
  <button onclick="caricaTurni()">Carica Turni</button>
  <button id="pulisci-tabella-btn" onclick="pulisciTabella()" style="background-color:#dc3545; color:#fff;">Pulisci Turni Mese</button>
  <button onclick="salvaTurniManuale()" style="background:linear-gradient(135deg,#b2f0d0,#7de8b0);color:#2e7d52;border:1px solid #a0e8c5;border-radius:5px;font-size:0.9em;padding:5px 14px;cursor:pointer;font-weight:600;">Salva Turni &#128190;</button>
  <span id="salva-turni-feedback" style="display:none;font-size:0.82em;font-weight:600;margin-left:6px;"></span>
  
  <!-- Popup di conferma personalizzato -->
  <div id="custom-confirm-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.4);z-index:4000;align-items:center;justify-content:center;">
    <div style="background:#fff;padding:2em 1.5em 1.5em 1.5em;border-radius:10px;max-width:400px;width:90vw;box-shadow:0 2px 16px #0003;text-align:center;">
      <p id="custom-confirm-msg" style="font-size:1.1em;color:#333;margin:0 0 1.5em 0;">Sei sicuro di voler cancellare tutti i turni del mese corrente?</p>
      <div style="display:flex;gap:16px;justify-content:center;">
        <button id="custom-confirm-ok" class="save-btn" style="background-color:#dc3545;">Conferma</button>
        <button id="custom-confirm-cancel" class="save-btn" style="background-color:#6c757d;">Annulla</button>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div id="output" class="table-container"></div>
    <div class="legend-container">
            <!-- Popup input anno statistiche REPE -->
            <div id="popup-inserisci-anno-repe" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);z-index:3000;align-items:center;justify-content:center;">
              <div style="background:#fff;padding:2em 1.5em 1.5em 1.5em;border-radius:10px;max-width:340px;width:96vw;box-shadow:0 2px 16px #0002;position:relative;display:flex;flex-direction:column;align-items:center;">
                <h3 style="color:#b80000;text-align:center;margin-top:0;margin-bottom:1em;font-size:1.15em;">Inserisci l'anno per le statistiche REPE</h3>
                <input id="input-anno-repe" type="number" min="2020" max="2100" value="" placeholder="es: 2026" style="font-size:1.1em;padding:7px 12px;border-radius:6px;border:1px solid #bbb;width:120px;text-align:center;outline:none;">
                <div style="margin-top:1.5em;display:flex;gap:16px;justify-content:center;width:100%;">
                  <button onclick="confermaAnnoRepe()" style="background:#176d1a;color:#fff;padding:7px 22px;border:none;border-radius:4px;font-size:1em;">Conferma</button>
                  <button onclick="chiudiPopupAnnoRepe()" style="background:#f8d7da;color:#b80000;padding:7px 18px;border:none;border-radius:4px;font-size:1em;">Annulla</button>
                </div>
                <span id="errore-anno-repe" style="display:none;color:#b80000;font-weight:bold;margin-top:1em;font-size:1em;"></span>
              </div>
            </div>
      <div id="legenda-header-row" style="position:relative;display:flex;align-items:center;justify-content:center;min-height:38px;">
        <h4 style="margin:0;color:#2a4d7a;text-align:center;width:100%;">Legenda Riepilogo</h4>
        <button id="btn-aggiorna-legenda-mobile" type="button" onclick="aggiornaLegendaManuale()" style="display:none;position:absolute;right:0;top:50%;transform:translateY(-50%);background:#ff9800;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:0.88em;font-weight:700;cursor:pointer;">Aggiorna</button>
      </div>
      <div id="legenda-feedback" style="display:none;text-align:center;font-size:0.85em;color:#b26a00;font-weight:600;margin:6px 0 0 0;">Legenda da aggiornare</div>
      <div id="legenda-operatori"></div>
      <button id="btn-statistiche-repe" class="save-btn" style="background-color:#b80000;margin-top:10px;width:100%;font-size:1em;" onclick="mostraStatisticheRepe()">Statistiche REPE annuali</button>
      <div id="popup-statistiche-repe" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);z-index:2000;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:2em 1.5em;border-radius:10px;max-width:480px;width:98vw;box-shadow:0 2px 16px #0002;position:relative;">
          <h3 style="color:#b80000;text-align:center;margin-top:0;">Statistiche REPE annuali</h3>
          <div id="contenuto-statistiche-repe"></div>
          <div style="text-align:right;margin-top:1.5em;">
            <button onclick="chiudiStatisticheRepe()" style="background:#6c757d;color:#fff;padding:7px 18px;border:none;border-radius:4px;font-size:1em;">Chiudi</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="preview-container"></div>
  <div id="progetto-backup-container" style="margin-top:2em;"></div>
  <button class="save-btn" onclick="generaAnteprimaBackup()">Genera Anteprima Backup</button>
  <button id="conferma-salvataggio-btn" class="save-btn" onclick="confermaSalvataggioBackup()" style="display: none; background-color: #28a745;">Conferma e Salva</button>
  <button id="chiudi-anteprima-btn" class="save-btn" onclick="chiudiAnteprima()" style="display: none; background-color: #6c757d;">Chiudi Anteprima</button>
  <button class="save-btn" onclick="toggleArchivio()" style="background-color: #6c757d;">Mostra/Nascondi Archivio</button>
  <div id="feedback-message"></div>
  <div id="archivio-container" style="display: none;">
    <h4>Archivio Turni Salvati</h4>
    <label>Mese: 
      <select id="archivio-filtro-mese">
        <option value="">--</option>
        <option value="1">Gennaio</option>
        <option value="2">Febbraio</option>
        <option value="3">Marzo</option>
        <option value="4">Aprile</option>
        <option value="5">Maggio</option>
        <option value="6">Giugno</option>
        <option value="7">Luglio</option>
        <option value="8">Agosto</option>
        <option value="9">Settembre</option>
        <option value="10">Ottobre</option>
        <option value="11">Novembre</option>
        <option value="12">Dicembre</option>
      </select>
    </label>
    <label>Anno: <input type="number" id="archivio-filtro-anno" min="2020" max="2100" style="width:80px;"></label>
    <button onclick="cercaArchivio()">Cerca</button>
    <div id="reperibilita-container" style="margin-top: 1.5em;"></div>
    <div id="archivio-preview"></div>
  </div>
  <!-- Qui va incluso tutto lo script JS aggiornato -->
  <script>
        // --- STATISTICHE REPE ANNUALI ---
        function mostraStatisticheRepe() {
          document.getElementById('input-anno-repe').value = new Date().getFullYear();
          document.getElementById('errore-anno-repe').style.display = 'none';
          document.getElementById('popup-inserisci-anno-repe').style.display = 'flex';
          setTimeout(() => { document.getElementById('input-anno-repe').focus(); }, 100);
        }

        function chiudiPopupAnnoRepe() {
          document.getElementById('popup-inserisci-anno-repe').style.display = 'none';
        }

        function confermaAnnoRepe() {
          const anno = Number(document.getElementById('input-anno-repe').value);
          const errore = document.getElementById('errore-anno-repe');
          if (!anno || isNaN(anno) || anno < 2020 || anno > 2100) {
            errore.textContent = "Anno non valido!";
            errore.style.display = 'block';
            return;
          }
          errore.style.display = 'none';
          document.getElementById('popup-inserisci-anno-repe').style.display = 'none';
          mostraLoader(true);
          fetch(APPSCRIPT_URL + '?action=getArchivioAnno&anno=' + encodeURIComponent(anno))
            .then(r => r.json())
            .then(archivio => {
              mostraLoader(false);
              if (!archivio || !Array.isArray(archivio) || archivio.length === 0) {
                document.getElementById('contenuto-statistiche-repe').innerHTML = '<span style="color:#b80000;font-weight:bold;">Nessun dato trovato per l\'anno selezionato.</span>';
                document.getElementById('popup-statistiche-repe').style.display = 'flex';
                return;
              }
              // archivio: array di oggetti {mese, anno, tabella: [ [header], [row1], ... ]}
              const NOMI = ["MACALUSO", "DINOLFO", "NAPOLI", "VENTIMIGLIA"];
              const ABBREV_MAP = { 'MACA': 'MACALUSO', 'DINO': 'DINOLFO', 'NAPO': 'NAPOLI', 'VENTI': 'VENTIMIGLIA', 'VENT': 'VENTIMIGLIA' };
              const stats = {};
              NOMI.forEach(n => stats[n] = {
                REP:0,
                'REP ORE':0,
                'REP FESTIVI':0,
                'REP PRIMI10_LV':0,
                'REP PRIMI10_SD':0
              });
              archivio.forEach(meseObj => {
                const tabella = meseObj.tabella;
                if (!tabella || tabella.length < 2) return;
                const header = tabella[0];
                for (let i = 1; i < tabella.length; i++) {
                  let nome = (tabella[i][0] || '').toUpperCase();
                  if (ABBREV_MAP[nome]) nome = ABBREV_MAP[nome];
                  if (!stats[nome]) continue;
                  for (let j = 1; j < tabella[i].length; j++) {
                    const cella = String(tabella[i][j] || '').toUpperCase();
                    const valori = cella.split(/[\/]/).map(v => v.trim());
                    if (valori.some(v => v === 'REP')) {
                      const giornoMatch = String(header[j] || '').match(/^(\d{1,2})/);
                      if (giornoMatch) {
                        const giorno = parseInt(giornoMatch[1], 10);
                        const data = new Date(meseObj.anno, meseObj.mese-1, giorno);
                        const day = data.getDay();
                        let ore = 12;
                        const festivo = data && (day === 0 || isHoliday(data, getPasqua(meseObj.anno)));
                        if (festivo) ore = 24;
                        else if (day === 6) ore = 18;
                        stats[nome].REP++;
                        stats[nome]['REP ORE'] += ore;
                        if (festivo) stats[nome]['REP FESTIVI']++;
                        if (giorno <= 10) {
                          if (day >= 1 && day <= 5) stats[nome]['REP PRIMI10_LV']++; // lun-ven
                          if (day === 0 || day === 6) stats[nome]['REP PRIMI10_SD']++; // dom-sab
                        }
                      }
                    }
                  }
                }
              });
              let html = `<div style="overflow-x:auto;"><table style="width:680px;min-width:600px;margin-top:1em;font-size:1.13em;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px #0001;table-layout:fixed;">`;
              html += '<tr style="background:#e0e7ef;color:#16304d;">'
                +'<th style="padding:10px 0;min-width:120px;width:auto;white-space:nowrap;font-weight:normal;">TSRM</th>'
                +'<th style="min-width:90px;">Totale REPE</th>'
                +'<th style="min-width:90px;">Totale Ore</th>'
                +'<th style="min-width:110px;">REPE Festività</th>'
                +'<th style="min-width:140px;">REPE Primi 10g Lun-Ven</th>'
                +'<th style="min-width:140px;">REPE Primi 10g Sab-Dom</th>'
              +'</tr>';
              NOMI.forEach(nome => {
                html += `<tr>`
                  +`<td style='color:#333;background:#f4f8fb;text-align:center;vertical-align:middle;min-width:120px;width:auto;white-space:nowrap;font-weight:normal;'>${nome}</td>`
                  +`<td style='color:#b80000;text-align:center;'>${stats[nome].REP}</td>`
                  +`<td style='color:#176d1a;text-align:center;'>${stats[nome]['REP ORE']}</td>`
                  +`<td style='color:#b80000;text-align:center;'>${stats[nome]['REP FESTIVI']}</td>`
                  +`<td style='color:#007bff;text-align:center;'>${stats[nome]['REP PRIMI10_LV']}</td>`
                  +`<td style='color:#ff9800;text-align:center;'>${stats[nome]['REP PRIMI10_SD']}</td>`
                +`</tr>`;
              });
              html += '</table></div>';
              document.getElementById('contenuto-statistiche-repe').innerHTML = html;
              document.getElementById('popup-statistiche-repe').style.display = 'flex';
            })
            .catch(err => {
              mostraLoader(false);
              document.getElementById('contenuto-statistiche-repe').innerHTML = '<span style="color:#b80000;font-weight:bold;">Errore nel recupero dati: '+(err && err.message ? err.message : err)+'</span>';
              document.getElementById('popup-statistiche-repe').style.display = 'flex';
            });
        }

        function chiudiStatisticheRepe() {
          document.getElementById('popup-statistiche-repe').style.display = 'none';
        }
    const NOMI = ["MACALUSO", "DINOLFO", "NAPOLI", "VENTIMIGLIA"];
    const GIORNI_SETT = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
    // Mesi in cui RR è abilitato (giugno, luglio, agosto, settembre)
    const MESI_RR = [6,7,8,9];
    let datiBackupDaSalvare = null;

    // --- Performance Optimization: Global State Management ---
    let currentSelections = {}; // Object to hold the state of all select elements {id: value}
    let currentTurniData = [];  // Array to hold the raw data for the current month's shifts
    let meseCorrente, annoCorrente;

    let saveTimeout = null; // Variabile per il timeout del salvataggio automatico
    let localStorageSaveTimeout = null;
    let legendaUpdateTimeout = null;
    let legendaUpdateInFrame = false;
    let legendaDirty = false;
    let legendaFeedbackTimeout = null;
    let orientationStabilizeTimeout = null;
    let selectTransitionResumeTimeout = null;
    let viewportChangeTimeout = null;
    let ultimaOrientazione = window.matchMedia('(orientation: portrait)').matches ? 'portrait' : 'landscape';

    function isLandscapeCompatta() {
      return window.matchMedia('(orientation: landscape)').matches && window.innerHeight <= 500;
    }

    function isPortraitMobile() {
      const isPortrait = window.matchMedia('(orientation: portrait)').matches;
      const isNarrow = window.innerWidth <= 1200;
      const isTouch = (navigator.maxTouchPoints || 0) > 0 || ('ontouchstart' in window);
      return isPortrait && isNarrow && isTouch;
    }

    function isMobileDevice() {
      const userAgent = (navigator.userAgent || '').toLowerCase();
      const isMobileUA = /android|iphone|ipad|ipod|mobile/.test(userAgent);
      const isTouch = (navigator.maxTouchPoints || 0) > 0 || ('ontouchstart' in window);
      return isMobileUA || (isTouch && window.innerWidth <= 1024);
    }

    function aggiornaControlliLegendaMobile() {
      const btn = document.getElementById('btn-aggiorna-legenda-mobile');
      const feedback = document.getElementById('legenda-feedback');
      if (!btn || !feedback) return;

      if (isMobileDevice()) {
        btn.style.display = 'inline-flex';
        btn.style.alignItems = 'center';
        btn.style.justifyContent = 'center';
        btn.textContent = legendaDirty ? 'Aggiorna *' : 'Aggiorna';

        if (legendaDirty) {
          feedback.style.display = 'block';
          feedback.style.color = '#b26a00';
          feedback.textContent = 'Legenda da aggiornare';
        }
      } else {
        btn.style.display = 'none';
        feedback.style.display = 'none';
      }
    }

    function segnalaLegendaDaAggiornare() {
      legendaDirty = true;
      aggiornaControlliLegendaMobile();
    }

    function segnalaModificheDaSalvare() {
      if (!isMobileDevice()) return;
      const feedback = document.getElementById('salva-turni-feedback');
      if (!feedback) return;
      feedback.style.display = 'inline';
      feedback.style.color = '#b26a00';
      feedback.textContent = 'Modifiche da salvare';
    }

    function aggiornaLegendaManuale() {
      aggiornaLegenda();
      const feedback = document.getElementById('legenda-feedback');
      if (feedback && isMobileDevice()) {
        clearTimeout(legendaFeedbackTimeout);
        feedback.style.display = 'block';
        feedback.style.color = '#176d1a';
        feedback.textContent = '✓ Legenda aggiornata';
        legendaFeedbackTimeout = setTimeout(() => {
          if (!legendaDirty) feedback.style.display = 'none';
        }, 1800);
      }
    }

    function abbreviaGiorno(nomeGiorno) {
      const base = (nomeGiorno || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
      if (base.startsWith('domen')) return 'Dom';
      if (base.startsWith('lun')) return 'Lun';
      if (base.startsWith('mar')) return 'Mar';
      if (base.startsWith('merc')) return 'Mer';
      if (base.startsWith('gio')) return 'Gio';
      if (base.startsWith('ven')) return 'Ven';
      if (base.startsWith('sab')) return 'Sab';
      return (nomeGiorno || '').slice(0, 3);
    }

    function aggiornaEtichetteSettimanaResponsive() {
      const abbreviate = isPortraitMobile();
      document.querySelectorAll('#output td.giorno-sett').forEach(cell => {
        const fullDay = cell.dataset.fullDay || cell.textContent.trim();
        if (!cell.dataset.fullDay) cell.dataset.fullDay = fullDay;
        cell.textContent = abbreviate ? abbreviaGiorno(fullDay) : fullDay;
      });
    }

    function gestisciViewportChange() {
      gestisciStabilizzazioneOrientamento();
      aggiornaControlliLegendaMobile();
      aggiornaEtichetteSettimanaResponsive();
    }

    function gestisciCambioViewportDebounced() {
      const orientazioneCorrente = window.matchMedia('(orientation: portrait)').matches ? 'portrait' : 'landscape';
      if (orientazioneCorrente === ultimaOrientazione && !isMobileDevice()) return;
      ultimaOrientazione = orientazioneCorrente;
      clearTimeout(viewportChangeTimeout);
      viewportChangeTimeout = setTimeout(() => {
        requestAnimationFrame(() => {
          aggiornaEtichetteSettimanaResponsive();
          aggiornaControlliLegendaMobile();
          gestisciStabilizzazioneOrientamento();
        });
      }, isMobileDevice() ? 90 : 220);
    }

    function sospendiTransizioniSelect(ms) {
      document.documentElement.style.setProperty('--select-transition', 'none');
      clearTimeout(selectTransitionResumeTimeout);
      selectTransitionResumeTimeout = setTimeout(() => {
        document.documentElement.style.setProperty('--select-transition', 'background-color 0.3s, color 0.3s');
      }, ms);
    }

    function gestisciStabilizzazioneOrientamento() {
      if (isMobileDevice()) {
        sospendiTransizioniSelect(180);
        clearTimeout(orientationStabilizeTimeout);
        orientationStabilizeTimeout = setTimeout(() => {
          aggiornaControlliLegendaMobile();
        }, 120);
        return;
      }

      if (!isLandscapeCompatta()) {
        aggiornaControlliLegendaMobile();
        return;
      }
      // Durante rotazione e assestamento viewport riduce lavoro grafico percepito
      sospendiTransizioniSelect(500);
      clearTimeout(orientationStabilizeTimeout);
      orientationStabilizeTimeout = setTimeout(() => {
        aggiornaLegendaDebounced();
      }, 400);
    }

    function aggiornaLegendaDebounced(force) {
      if (isMobileDevice() && !force) {
        segnalaLegendaDaAggiornare();
        return;
      }
      clearTimeout(legendaUpdateTimeout);
      const delay = isLandscapeCompatta() ? 360 : (isPortraitMobile() ? 260 : 120);
      legendaUpdateTimeout = setTimeout(() => {
        if (legendaUpdateInFrame) return;
        legendaUpdateInFrame = true;
        requestAnimationFrame(() => {
          aggiornaLegenda();
          legendaUpdateInFrame = false;
        });
      }, delay);
    }

    function salvaStatoInLocalStorageDebounced() {
      clearTimeout(localStorageSaveTimeout);
      const delay = isLandscapeCompatta() ? 850 : (isPortraitMobile() ? 650 : 250);
      localStorageSaveTimeout = setTimeout(() => {
        salvaStatoInLocalStorage();
      }, delay);
    }
    // Caricamento automatico ultimo mese/anno lavorato
    window.addEventListener('DOMContentLoaded', () => {
      let ultimoMese = localStorage.getItem('ultimoMese');
      let ultimoAnno = localStorage.getItem('ultimoAnno');
      const oggi = new Date();
      if (!ultimoMese) ultimoMese = (oggi.getMonth() + 1);
      if (!ultimoAnno) ultimoAnno = oggi.getFullYear();
      document.getElementById('mese').value = ultimoMese;
      document.getElementById('anno').value = ultimoAnno;
      aggiornaControlliLegendaMobile();
      window.addEventListener('orientationchange', gestisciCambioViewportDebounced, { passive: true });
      window.addEventListener('resize', gestisciCambioViewportDebounced, { passive: true });
      caricaTurni();
    });

    function mostraLoader(show) {
      const loader = document.getElementById('loader-overlay');
      if (loader) loader.style.display = show ? 'flex' : 'none';
    }

    // --- Logica di Caricamento Ottimizzata ---
    function caricaTurni() {
      const mese = document.getElementById('mese').value;
      const anno = document.getElementById('anno').value;

      if (meseCorrente && annoCorrente && String(meseCorrente) === String(mese) && String(annoCorrente) === String(anno)) {
        // Se già caricati, non fare nulla (evita re-render e reflow inutili)
        return;
      }

      localStorage.setItem('ultimoMese', mese);
      localStorage.setItem('ultimoAnno', anno);
      meseCorrente = mese;
      annoCorrente = anno;

      const cacheKey = `turni_${anno}-${mese}`;
      const cachedData = localStorage.getItem(cacheKey);

      if (cachedData) {
        try {
          const { turni } = JSON.parse(cachedData);
          if (turni && turni.length > 0) {
            console.log("Struttura tabella dalla cache, stato turni dal server...");
            currentTurniData = turni;

            mostraLoader(true);
            fetch(`${APPSCRIPT_URL}?action=getStatoTurni&anno=${encodeURIComponent(anno)}&mese=${encodeURIComponent(mese)}`)

              .then(statoSalvato => {

                localStorage.setItem(cacheKey, JSON.stringify({turni, stato: statoSalvato}));

                // Fallback: usa tabella senza stato
                mostraTabella(turni, mese, anno, {});
                mostraLoader(false);
              });
            return;
          }
        } catch (e) {
          console.error("Cache corrotta, la rimuovo.", e);
          localStorage.removeItem(cacheKey);
        }
      }

      // Se non ci sono dati validi in cache, carica dal server.
      console.log("Cache vuota o non valida. Caricamento dal server...");
      mostraLoader(true);
      fetch(`${APPSCRIPT_URL}?action=getStatoTurni&anno=${encodeURIComponent(anno)}&mese=${encodeURIComponent(mese)}`)
        .then(r => r.json())
        .then(statoSalvato => {

            .then(r => r.json())
            .then(turni => {

                currentTurniData = turni;

                localStorage.setItem(cacheKey, JSON.stringify({turni, stato: statoSalvato}));
              } else {
                document.getElementById('output').innerHTML = '<span style="color:#dc3545;font-weight:bold;">Nessun turno trovato per questo mese/anno.</span>';

            .catch(() => {
              mostraLoader(false);
              document.getElementById('output').innerHTML = '<span style="color:#dc3545;font-weight:bold;">Errore nel caricamento dei turni!</span>';
            });
        })
        .catch(() => {
          mostraLoader(false);
          document.getElementById('output').innerHTML = '<span style="color:#dc3545;font-weight:bold;">Errore nel recupero stato turni!</span>';
        });

    function getPasqua(anno) {
      try {
        const a = anno % 19, b = anno % 4, c = anno % 7, k = Math.floor(anno / 100), p = Math.floor((13 + 8 * k) / 25), q = Math.floor(k / 4);
        const M = (15 - p + k - q) % 30, N = (4 + k - q) % 7, d = (19 * a + M) % 30, e = (2 * b + 4 * c + 6 * d + N) % 7;
        const giorno = 22 + d + e;
        const data = giorno > 31 ? new Date(anno, 3, giorno - 31) : new Date(anno, 2, giorno);
        if (isNaN(data.getTime())) return null;
        return data;
      } catch (e) {
        return null;
      }
    }

    function isHoliday(date, pasqua) {
      const g = date.getDate(), m = date.getMonth();
      const festeFisse = [
        {g:1,m:0},   // 1 gennaio
        {g:6,m:0},   // 6 gennaio
        {g:25,m:3},  // 25 aprile (corretto: aprile è 3)
        {g:1,m:4},   // 1 maggio
        {g:2,m:5},   // 2 giugno
        {g:15,m:7},  // 15 agosto
        {g:15,m:6},  // 15 luglio
        {g:1,m:10},  // 1 novembre
        {g:8,m:11},  // 8 dicembre
        {g:25,m:11}, // 25 dicembre
        {g:26,m:11}  // 26 dicembre
      ];
      if (festeFisse.some(f => f.g === g && f.m === m)) return true;
      if (!pasqua || !(pasqua instanceof Date) || isNaN(pasqua.getTime())) return false;
      const pasquetta = new Date(pasqua);
      pasquetta.setDate(pasqua.getDate() + 1);
      return (g === pasqua.getDate() && m === pasqua.getMonth()) || (g === pasquetta.getDate() && m === pasquetta.getMonth());
    }

    // statoSalvato: oggetto {selectId: valore, ...} oppure null
    function mostraTabella(turni, mese, anno, statoSalvato) {
      try {
        console.log('DEBUG: mese=' + mese + ', anno=' + anno);
        if (!turni || !turni.length) {
          document.getElementById('output').innerHTML = '<b>Nessun turno trovato</b>';
          return;
        }
        meseCorrente = mese;
        annoCorrente = anno;
        const NOMI_MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
        const titoloMese = `<h3 style='margin-bottom:0.5em;color:#2a4d7a;'>${NOMI_MESI[mese-1]} ${anno}</h3>`;
        const pasqua = getPasqua(anno);
        console.log('DEBUG: Pasqua =', pasqua);

        // --- Performance Optimization: Event Delegation & State Initialization ---
        currentSelections = {}; // Reset state for the new table
        const outputDiv = document.getElementById('output');
        outputDiv.removeEventListener('change', handleSelectChange); // Remove old listener if any
        outputDiv.addEventListener('change', handleSelectChange); // Add a single, efficient listener

        let html = `${titoloMese}<table><tr><th>Giorno</th><th>Settimana</th>${NOMI.map(n => `<th>${n}</th>`).join('')}</tr>`;

        turni.forEach(t => {
          const data = new Date(anno, mese - 1, t.giorno);
          if (isNaN(data.getTime())) {
            console.error('DEBUG: Data non valida per giorno', t.giorno, 'mese', mese, 'anno', anno);
          }
          const giornoSett = GIORNI_SETT[data.getDay()];
          const isDomenica = data.getDay() === 0;
          const isFestivo = isHoliday(data, pasqua);
          const isSabato = data.getDay() === 6;
          const classeRiga = (isDomenica || isFestivo) ? ' class="festivo"' : '';
          html += `<tr${classeRiga}><td>${t.giorno}</td><td class="giorno-sett" data-full-day="${giornoSett}">${giornoSett}</td>`;

          NOMI.forEach(nome => {
            const festivoId = `festivo_${t.giorno}_${nome}`;
            const mattinaId = `mattina_${t.giorno}_${nome}`;
            const pomeriggioId = `pomeriggio_${t.giorno}_${nome}`;
            const notteId = `notte_${t.giorno}_${nome}`;

            if (isDomenica || isFestivo) {
              html += `<td class="operator-cell"><div><small>&nbsp;</small>${selectSigla(festivoId, '', ['REP'])}</div></td>`;
              currentSelections[festivoId] = ''; // Initialize state
            } else {
              const opzioniMattina = ['1', 'VA'];
              const opzioniPomeriggio = ['2', 'PRO', 'VA'];
              if (isSabato) opzioniPomeriggio.push('REP');
              const opzioniNotte = ['REP'];
              html += `<td class="operator-cell">
                <div><small>M</small>${selectSigla(mattinaId, '', opzioniMattina)}</div>
                <div><small>P</small>${selectSigla(pomeriggioId, '', opzioniPomeriggio)}</div>
                <div><small>N</small>${selectSigla(notteId, '', opzioniNotte)}</div>
              </td>`;
              // Initialize state for non-holiday selects
              currentSelections[mattinaId] = '';
              currentSelections[pomeriggioId] = '';
              currentSelections[notteId] = '';
            }
          });
          html += '</tr>';
        });
        html += '</table>';
        document.getElementById('output').innerHTML = html;

        // Priority: Backend State (condiviso tra dispositivi) > LocalStorage > Default
        const stateToApply = (statoSalvato && Object.keys(statoSalvato).length > 0) ? statoSalvato : {};

        // Ripristina stato da backend se presente, altrimenti da cache JS o localStorage
        if (stateToApply && typeof stateToApply === 'object' && Object.keys(stateToApply).length > 0) {
          Object.keys(stateToApply).forEach(selectId => {
            const select = document.getElementById(selectId);
            if (select) {
              const value = stateToApply[selectId];
              select.value = value;
              updateSelectColor(select);
              currentSelections[selectId] = value; // IMPORTANT: Sync currentSelections with the restored state
            }
          });
        } else {
          // If no state to apply, just ensure colors are correct for empty selects
          document.querySelectorAll('#output select').forEach(updateSelectColor);
        }

        const saveFeedback = document.getElementById('salva-turni-feedback');
        if (saveFeedback) {
          saveFeedback.style.display = 'none';

        }

        aggiornaLegenda();
        aggiornaEtichetteSettimanaResponsive();
        aggiornaControlliLegendaMobile();
        // La tabella di backup progetto è stata rimossa come da richiesta per evitare confusione.
        // Se necessario, la sua logica può essere ripristinata o spostata in un'altra sezione.
        const backupContainer = document.getElementById('progetto-backup-container');
        if(backupContainer) {

        }
      } catch (err) {

      }

    function selectSigla(id, prefill, opzioni) {
      // Determina il mese corrente per abilitare RR
      let meseAttivo = meseCorrente ? Number(meseCorrente) : null;
      const opzioniRR = [...opzioni];
      if (MESI_RR.includes(meseAttivo)) {
        opzioniRR.push('RR');
      }
      const opzioniComplete = [...new Set(['', 'F', 'RC', ...opzioniRR.filter(Boolean)])];
      let s = `<select id="${id}">`; // Rimosso onchange per usare solo event delegation
      opzioniComplete.forEach(sigla => {
        // RR disabilitato se non è un mese abilitato
        let disabled = '';
        if (sigla === 'RR' && !MESI_RR.includes(meseAttivo)) disabled = 'disabled';
        const selected = (prefill && sigla === prefill) ? 'selected' : '';
        const label = sigla === 'F' ? 'F' : (sigla === 'RC' ? 'RC' : sigla);
        s += `<option value="${sigla}" ${selected} ${disabled}>${label}</option>`;
      });
      return s + '</select>';
    }

    // Se selezioni "VA" o "PRO" in una fascia (mattina/pomeriggio), rimuovilo dagli altri operatori per lo stesso giorno e fascia
    function gestisciUnicitaVA_PRO(select) {
      const idParts = select.id.split('_');
      const fascia = idParts[0];
      const giorno = idParts[1];
      const nomeAttuale = idParts[2];

    function updateSelectColor(select) {
      if (select.dataset.lastStyledValue === select.value) return;
      const colors = {
        'VA':{t:'#0a2377',b:'#b3d1ff'},      // blu chiaro
        'PRO':{t:'#006b2e',b:'#b6ffd0'},    // verde chiaro
        'REP':{t:'#b80000',b:'#ffd6d6'},    // rosso chiaro
        'F':{t:'#444',b:'#e2e3e5'},         // grigio chiaro
        'RC':{t:'#444',b:'#e2e3e5'},        // grigio chiaro
        '1':{t:'#a65c00',b:'#ffe5b4'},      // arancione chiaro
        '2':{t:'#4b2e83',b:'#e5d0f5'},      // viola chiaro
        'E':{t:'#7a6f00',b:'#fff9c4'},      // giallo chiaro
        'RR':{t:'#fff',b:'#e040fb'}         // magenta chiaro, testo bianco
      };
      const c = colors[select.value] || {t:'black',b:'white'};
      select.style.color = c.t;
      select.style.backgroundColor = c.b;
      select.dataset.lastStyledValue = select.value;
    }

    // --- Performance Optimization: Legend calculation from state object ---
    function aggiornaLegenda() {
      const counts = {};
      const pasqua = getPasqua(annoCorrente);
      NOMI.forEach(nome => { counts[nome] = {'VA':0,'RR':0,'REP':0,'PRO':0,'1':0,'2':0,'RC':0,'VAx2':0,'REP ORE':0,'F':0}; });

      // Iterate over the raw turni data, not the DOM
      currentTurniData.forEach(t => {
        const giorno = t.giorno;
        const data = new Date(annoCorrente, meseCorrente - 1, giorno);
        const dayOfWeek = data.getDay();
        const isFestivoCompleto = dayOfWeek === 0 || isHoliday(data, pasqua);

        NOMI.forEach(nome => {
          let turniGiorno = [];
          // Get values from the state object, not the DOM
          if (isFestivoCompleto) {
            turniGiorno.push(currentSelections[`festivo_${giorno}_${nome}`]);
          } else {
            turniGiorno.push(currentSelections[`mattina_${giorno}_${nome}`]);
            turniGiorno.push(currentSelections[`pomeriggio_${giorno}_${nome}`]);
            turniGiorno.push(currentSelections[`notte_${giorno}_${nome}`]);
          }
          turniGiorno = turniGiorno.filter(t => t); // Remove empty/null values

          if (turniGiorno[0] === 'VA' && turniGiorno[1] === 'VA') counts[nome]['VAx2']++;
          const repCount = turniGiorno.filter(t => t === 'REP').length;
          if (repCount > 0) {
            if (isFestivoCompleto) { counts[nome]['REP'] += 2; counts[nome]['REP ORE'] += 24; }
            else if (dayOfWeek === 6) { counts[nome]['REP'] += 1.5; counts[nome]['REP ORE'] += 18; }
            else { counts[nome]['REP'] += repCount; counts[nome]['REP ORE'] += repCount * 12; }
          }

          // Conteggia F e RC una sola volta per giorno, anche se presenti in più fasce
          if (turniGiorno.includes('F')) counts[nome]['F'] += 1;
          if (turniGiorno.includes('RC')) counts[nome]['RC'] += 1;

          // Conteggia gli altri turni normalmente (esclusi F, RC, REP)
          const altriTurni = turniGiorno.filter(t => t !== 'REP' && t !== 'F' && t !== 'RC');
          altriTurni.forEach(turno => {
            if (counts[nome].hasOwnProperty(turno) && turno) {
              counts[nome][turno] += 1;
            }
          });
        });
      });

      let legendaHtml = '';
      const colors = {
        'VA':'#0a2377',
        'PRO':'#006b2e',
        'REP':'#b80000',
        'REP ORE':'#b80000',
        'F':'#444',
        'RC':'#444',
        '1':'#a65c00',
        '2':'#4b2e83',
        'E':'#7a6f00',
        'RR':'#e040fb',
        'VAx2':'#0a2377'
      };
      NOMI.forEach(nome => {
          legendaHtml += `<div class="legend-operator" style="background:#fff;">
            <h5>${nome}</h5>
            <div class="legend-counts" style="display:flex;flex-wrap:wrap;gap:4px 10px;justify-content:space-between;">
              <span style="color:${colors['1']};font-weight:bold;">1: <b>${counts[nome]['1']}</b></span>
              <span style="color:${colors['2']};font-weight:bold;">2: <b>${counts[nome]['2']}</b></span>
              <span style="color:${colors.VA};font-weight:bold;">VA: <b>${counts[nome]['VA']}</b></span>
              <span style="color:${colors.VAx2};font-weight:bold;">VAx2: <b>${counts[nome]['VAx2']}</b></span>
              <span style="color:${colors.RC};font-weight:bold;">RC: <b>${counts[nome]['RC']}</b></span>
              <span style="color:${colors.REP};font-weight:bold;">REP: <b>${counts[nome]['REP']}</b></span>
              <span style="color:${colors['REP ORE']};font-weight:bold;">REP Ore: <b>${counts[nome]['REP ORE']}</b></span>
              <span style="color:${colors.PRO};font-weight:bold;">PRO: <b>${counts[nome]['PRO']}</b></span>
              <span style="color:${colors.F};font-weight:bold;">F: <b>${counts[nome]['F']}</b></span>
              <span style="color:${colors['RR']};font-weight:bold;">RR: <b>${counts[nome]['RR']}</b></span>
            </div>
          </div>`;
      });
      document.getElementById('legenda-operatori').innerHTML = legendaHtml;
      legendaDirty = false;
      aggiornaControlliLegendaMobile();
    }

    function gestisciAutomazione(select, tipo) {
        const valore = (select.value || '').trim();
        const idParts = select.id.split('_');
        if (idParts[0] === 'festivo') return;
        const giorno = idParts[1], nome = idParts[2];
        const fasce = ['mattina', 'pomeriggio', 'notte'];
        const gruppo = fasce
          .map(fascia => document.getElementById(`${fascia}_${giorno}_${nome}`))
          .filter(Boolean);

        // Se imposti F/RC su una fascia, replica su tutte e 3
        if (valore === tipo) {
          gruppo.forEach(altroSelect => {
            if ((altroSelect.value || '').trim() !== tipo) {
              altroSelect.value = tipo;
              updateSelectColor(altroSelect);
              currentSelections[altroSelect.id] = tipo;
            }
          });
          return;
        }

        // Se svuoti una fascia che era parte del blocco F/RC, svuota tutte e 3
        if (valore === '') {
          const contieneTipo = gruppo.some(s => (s.value || '').trim() === tipo);
          if (contieneTipo) {
            gruppo.forEach(altroSelect => {
              if ((altroSelect.value || '').trim() === tipo) {
                altroSelect.value = '';
                updateSelectColor(altroSelect);
                currentSelections[altroSelect.id] = '';
              }
            });
          }
        }
    }
    function gestisciFerie(select) { gestisciAutomazione(select, 'F'); }
    function gestisciRC(select) { gestisciAutomazione(select, 'RC'); }

    function gestisciRepEsclusiva(select) {
      if (select.value.trim() !== 'REP') return;
      const [fascia, giorno, nomeAttuale] = select.id.split('_');
      NOMI.forEach(nome => {
        if (nome === nomeAttuale) return;
        const altroSelect = document.getElementById(`${fascia}_${giorno}_${nome}`);
        if (altroSelect && altroSelect.value.trim() === 'REP') {
          altroSelect.value = '';
          updateSelectColor(altroSelect);
          currentSelections[altroSelect.id] = ''; // Sync state object
        }
      });
    }

    function gestisciDoppioVA(select) {
      const [fascia, giorno, nome] = select.id.split('_');
      if (fascia !== 'mattina' && fascia !== 'pomeriggio') return;
      const mattina = document.getElementById(`mattina_${giorno}_${nome}`);
      const pomeriggio = document.getElementById(`pomeriggio_${giorno}_${nome}`);
      if (mattina && pomeriggio && mattina.value === 'VA' && pomeriggio.value === 'VA') {
        for (let i = parseInt(giorno, 10); i <= new Date(annoCorrente, meseCorrente, 0).getDate(); i++) {
          const dataControllo = new Date(annoCorrente, meseCorrente - 1, i);
          if (dataControllo.getDay() === 6) {
            ['mattina', 'pomeriggio', 'notte'].forEach(fasciaSabato => {
              const selectSabato = document.getElementById(`${fasciaSabato}_${i}_${nome}`);
              if (selectSabato) {
                selectSabato.value = 'RC';
                updateSelectColor(selectSabato);
                currentSelections[selectSabato.id] = 'RC'; // Sync state object
              }
            });
            break;
          }
        }
      }
    }

    function generaAnteprimaBackup() {
      const mese = Number(document.getElementById('mese').value);
      const anno = Number(document.getElementById('anno').value);
      const table = document.querySelector('#output table');
      if (!table) return alert('Nessuna tabella trovata!');

      const GIORNI_SETT_INIZIALI = ["D", "L", "M", "M", "G", "V", "S"];

        const data = new Date(anno, mese - 1, i);
        header.push({ giorno: i, iniziale: GIORNI_SETT_INIZIALI[data.getDay()], isFestivo: data.getDay() === 0 || isHoliday(data, pasqua, anno) });

        const nomeVisualizzato = nome.startsWith('VENT') ? 'VENTI' : nome.substring(0, 4);
        const rigaOperatore = [nomeVisualizzato];
        // Iterate from day 1 to end of month
        for (let giorno = 1; giorno <= new Date(anno, mese, 0).getDate(); giorno++) {
            const data = new Date(anno, mese - 1, giorno);
            const isFestivoRow = data.getDay() === 0 || isHoliday(data, pasqua);
            let turniCella = [];
            // Get values from the state object
            if (isFestivoRow) {
              const turno = currentSelections[`festivo_${giorno}_${nome}`];
              if (turno) turniCella.push(turno);
            } else {
              const turnoM = currentSelections[`mattina_${giorno}_${nome}`];
              const turnoP = currentSelections[`pomeriggio_${giorno}_${nome}`];
              const turnoN = currentSelections[`notte_${giorno}_${nome}`];

              if (turnoM === 'VA') turniCella.push('<span style="white-space: nowrap;">VA<small style="color:blue;">(M)</small></span>');
              else if (turnoM) turniCella.push(turnoM);

              if (turnoP === 'VA') turniCella.push('<span style="white-space: nowrap;">VA<small style="color:orange;">(P)</small></span>');
              else if (turnoP) turniCella.push(turnoP);

              if (turnoN) turniCella.push(turnoN);
            }

            // Logica per unire i turni, mostrando F e RC una sola volta
            const unici = [];
            turniCella.forEach(t => {
              const cleanTurno = t.replace(/<[^>]*>/g, '').substring(0, 2); // Prende solo la sigla (es. 'VA' da '<span>VA...')
              if ((cleanTurno === 'F' || cleanTurno === 'RC') && unici.some(u => u.startsWith(cleanTurno))) {
                // non fare nulla, già presente
              } else {
                unici.push(t);
              }
            });
            const testoCella = unici.join('<br>');
            rigaOperatore.push(testoCella);
        }
        tabellaSemplificata.push(rigaOperatore);
      });

      datiBackupDaSalvare = { mese, anno, tabella: tabellaSemplificata.map(riga => riga.map(cella => cella.replace(/<br>/g, ' / '))) };

      previewHtml += '</table></div>';

      document.getElementById('conferma-salvataggio-btn').style.display = 'inline-block';
      document.getElementById('chiudi-anteprima-btn').style.display = 'inline-block';

            <th style='padding:10px 5px;background:#005f5f;'>TSRM Notte (REPE)</th>
          </tr>`;
        
        const pasqua = getPasqua(anno);
        Object.values(giorniDelMese).forEach(turno => {
          const giornoSettimana = turno.giornoSett.charAt(0).toUpperCase() + turno.giornoSett.slice(1,3);
          const data = turno.data;
          const isFestivo = data.getDay() === 0 || isHoliday(data, pasqua);
          const coloreData = isFestivo ? '#b80000' : '#111';
          const coloreGiorno = isFestivo ? '#b80000' : '#2a4d7a';
          html += `<tr style="background:#fff;">
            <td style='padding:8px 5px;font-weight:bold;color:${coloreData};'>${data.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})} <span style='color:${coloreGiorno};font-size:0.95em;font-weight:normal;'>(${giornoSettimana})</span></td>
            <td style='padding:8px 5px;font-weight:bold;color:#0a2377;'>${(turno.mattina || '-').replace('VENTI', 'VENTIMIGLIA')}</td>
            <td style='padding:8px 5px;font-weight:bold;color:${(turno.pomeriggio || '').includes('PROGETTO') ? '#006b2e' : ((turno.pomeriggio || '').includes('REPERIBILE') ? '#b80000' : '#0a2377')};'>${(turno.pomeriggio || '-').replace('VENTI', 'VENTIMIGLIA')}</td>
            <td style='padding:8px 5px;font-weight:bold;color:#b80000;'>${(turno.notte || '-').replace('VENTI', 'VENTIMIGLIA')}</td>
          </tr>`;
        });
        html += `</table>`;

        // Aggiunta numeri di telefono (stile migliorato)
        html += `<div style="width:85%;margin:1.5em auto;padding:1em;background-color:#f4f8fb;border:1px solid #e0e7ef;border-radius:8px;">
          <h4 style="margin-top:0;color:#2a4d7a;text-align:center;margin-bottom:1em;">Contatti</h4>
          <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:1em 2em;font-size:0.95em;text-align:center;">
            <p style="margin:0;"><strong>VENTIMIGLIA:</strong> 389 5570239</p>
            <p style="margin:0;"><strong>MACALUSO:</strong> 329 7332321</p>
            <p style="margin:0;"><strong>DINOLFO:</strong> 392 6817053</p>
            <p style="margin:0;"><strong>NAPOLI:</strong> 333 4745282</p>
          </div>
        </div>`;

        container.innerHTML = html;

        window.esportaTabellaUnificataPDF = function() {
          const tabella = document.getElementById('tabella-unificata-stampabile');
          if (!tabella) return alert('Tabella non trovata!');
          const win = window.open('', '', 'width=900,height=700');
          win.document.write('<html><head><title>Turni e Reperibilità Vascolare</title>');
          win.document.write('<style>body{font-family:Arial,sans-serif;}table{border-collapse:collapse;width:100%;font-size:1.05em;}th,td{border:1px solid #b0b0b0;padding:8px;text-align:center;}th{background:#005f5f;color:#fff;}tr:nth-child(even){background:#f4f8fb;}</style>');
          win.document.write('</head><body>');
          win.document.write(`<h3 style='color:#008B8B;text-align:center;margin-bottom:0.2em;font-size:1.25em;letter-spacing:1px;'>TURNI E REPERIBILITÀ VASCOLARE MESE ${NOMI_MESI[mese-1].toUpperCase()} ${anno}</h3>`);
          win.document.write(tabella.outerHTML.replace(/VENTI/g, 'VENTIMIGLIA'));
          // Aggiungi contatti al PDF
          win.document.write(document.querySelector('#reperibilita-container > div:last-of-type').outerHTML);
          win.document.write('</body></html>');
          win.document.close();
          setTimeout(()=>{win.print();},400);
        };

        window.esportaTabellaUnificataExcel = function() {
          let csv = `TURNI E REPERIBILITÀ VASCOLARE MESE ${NOMI_MESI[mese-1].toUpperCase()} ${anno}\n"Data & Giorno","TSRM Mattina","TSRM Pomeriggio","TSRM Notte (REPE)"\n`;
          Object.values(giorniDelMese).forEach(turno => {
            const giornoSettimana = turno.giornoSett.charAt(0).toUpperCase() + turno.giornoSett.slice(1,3);
            const dataLabel = turno.data.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}) + ' (' + giornoSettimana + ')';
            const mattina = (turno.mattina || '-').replace('VENTI', 'VENTIMIGLIA').replace(/<[^>]*>/g, '');
            const pomeriggio = (turno.pomeriggio || '-').replace('VENTI', 'VENTIMIGLIA').replace(/<[^>]*>/g, '');
            const notte = (turno.notte || '-').replace('VENTI', 'VENTIMIGLIA').replace(/<[^>]*>/g, '');
            csv += `"${dataLabel.replace(/"/g,'""')}","${mattina.replace(/"/g,'""')}","${pomeriggio.replace(/"/g,'""')}","${notte.replace(/"/g,'""')}"\n`;
          });
          const blob = new Blob([csv], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `Turni_e_REPE_${NOMI_MESI[mese-1]}_${anno}.csv`;
          document.body.appendChild(a);
          a.click();
          setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);}, 500);
        };
    }

  </script>
  <script>
  // Stub globale per evitare ReferenceError se la funzione non è definita altrove
  window.caricaListaArchivio = window.caricaListaArchivio || function(){};
  // Feedback visivo se la tabella progetti non viene generata
  if (!window.generaTabellaProgetto) {
    const btns = document.querySelectorAll('button[onclick*="generaTabellaProgetto"]');
    btns.forEach(btn => {
      btn.addEventListener('click', function() {
        alert('Funzione generaTabellaProgetto non disponibile!');
      });
    });
  }
  </script>
</body>
