<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Turni TSRM</title>
    <style>
        :root {
            --bg-va: #b3d1ff; --text-va: #0a2377;
            --bg-pro: #b6ffd0; --text-pro: #006b2e;
            --bg-rep: #ffd6d6; --text-rep: #b80000;
            --bg-f: #e2e3e5;   --text-f: #444;
        }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f7f6; font-size: 14px; }
        .header { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 4px; text-align: center; overflow: hidden; }
        
        /* Intestazioni */
        th { background: #eee; font-size: 12px; height: 40px; }
        .col-giorno { width: 45px; }

        /* Celle Turni: Disposizione Verticale (M, P, N) */
        .turno-container { display: flex; flex-direction: column; gap: 2px; }
        
        select { 
            width: 100%; border: 1px solid #ccc; border-radius: 3px; 
            font-size: 12px; height: 26px; appearance: none; text-align-last: center;
        }

        /* Colori dinamici */
        .sel-VA { background: var(--bg-va) !important; color: var(--text-va); font-weight: bold; }
        .sel-PRO { background: var(--bg-pro) !important; color: var(--text-pro); font-weight: bold; }
        .sel-REP { background: var(--bg-rep) !important; color: var(--text-rep); font-weight: bold; }
        .sel-F, .sel-RC { background: var(--bg-f) !important; color: var(--text-f); }

        .festivo { background: #ffebee; }
        .festivo td:first-child { color: red; font-weight: bold; }

        button { padding: 8px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; margin: 2px; }
        .btn-load { background: #007bff; color: white; }
        .btn-save { background: #28a745; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <strong>Mese:</strong> <input type="number" id="mese" value="4" style="width:40px">
        <strong>Anno:</strong> <input type="number" id="anno" value="2026" style="width:60px">
        <br><br>
        <button class="btn-load" onclick="caricaTurni()">Carica</button>
        <button class="btn-save" onclick="salvaTurniManuale()">Salva 💾</button>
        <span id="feedback"></span>
    </div>

    <div id="output"></div>

    <script>
        const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbygfswYatsxqiZrZoVDDZzo20XolahNbEyaUg9Zq0wp9jxSt-0ltxyL2nzYirgnoBJ-KQ/exec"; 
        const NOMI = ["MACALUSO", "DINOLFO", "NAPOLI", "VENTIMIGLIA"];
        let currentSelections = {};

        async function caricaTurni() {
            const m = document.getElementById('mese').value;
            const a = document.getElementById('anno').value;
            const out = document.getElementById('output');
            out.innerHTML = "Caricamento...";

            try {
                const r = await fetch(${APPSCRIPT_URL}?action=getStatoTurni&mese=${m}&anno=${a});
                const j = await r.json();
                const stato = j.ok ? j.stato : {};
                
                // Generiamo i giorni (30 o 31)
                const giorniInMese = new Date(a, m, 0).getDate();
                let html = <table><tr><th class="col-giorno">Giorno</th>;
                NOMI.forEach(n => html += <th>${n.substring(0,4)}</th>);
                html += </tr>;

                for(let g=1; g<=giorniInMese; g++) {
                    const data = new Date(a, m-1, g);
                    const isF = data.getDay() === 0; 
                    const labelG = g + " " + ["D","L","M","M","G","V","S"][data.getDay()];
                    
                    html += <tr class="${isF ? 'festivo' : ''}"><td>${labelG}</td>;
                    
                    NOMI.forEach(n => {
                        html += <td><div class="turno-container">;
                        // Creiamo 3 select per cella: Mattina, Pomeriggio, Notte
                        ['m','p','n'].forEach(f => {
                            const id = ${f}_${g}_${n};
                            const val = stato[id] || "";
                            html += `<select id="${id}" class="sel-${val}" onchange="updateStyle(this)">
                                        ${getOptions(val)}
                                     </select>`;
                        });
                        html += </div></td>;
                    });
                    html += </tr>;
                }
                out.innerHTML = html + </table>;
            } catch(e) { out.innerHTML = "Errore connessione!"; }
        }

        function getOptions(selected) {
            const opt = ["", "1", "2", "VA", "PRO", "REP", "F", "RC"];
            return opt.map(o => <option value="${o}" ${o===selected?'selected':''}>${o||'-'}</option>).join('');
        }

        function updateStyle(s) {
            s.className = sel-${s.value};
            currentSelections[s.id] = s.value;
        }

        async function salvaTurniManuale() {
            const f = document.getElementById('feedback');
            f.textContent = "Salvataggio...";
            
            // Raccogliamo tutti i valori delle select
            const selects = document.querySelectorAll('select');
            const stato = {};
            selects.forEach(s => { if(s.value) stato[s.id] = s.value; });

            try {
                await fetch(APPSCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: "salvaStatoTurni",
                        mese: document.getElementById('mese').value,
                        anno: document.getElementById('anno').value,
                        stato: stato
                    })
                });
                f.textContent = " ✓ Salvato";
                setTimeout(() => f.textContent = "", 2000);
            } catch(e) { f.textContent = " Errore!"; }
        }
    </script>
</body>
</html>
