<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Turni Tsrm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0, minimum-scale=0.5">
  <link rel="icon" type="image/png" sizes="32x32" href="https://i.ibb.co/9mJcD7S1/1775233609955.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co/9mJcD7S1/1775233609955.png">
  <meta name="theme-color" content="#2a4d7a">
  <link rel="stylesheet" href="custom-styles.css">
  <script>
    // URL del tuo backend Apps Script
    const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbygfswYatsxqiZrZoVDDZzo20XolahNbEyaUg9Zq0wp9jxSt-0ltxyL2nzYirgnoBJ-KQ/exec";
  </script>
</head>
<body>

  <div id="loader-overlay" class="loader-overlay" style="display:none;">
    <div class="loader-content">
      <div class="spinner"></div>
      <span class="loader-text">Caricamento...</span>
    </div>
  </div>

  <h2>Gestione Turni</h2>
  
  <div class="controls">
    <label>Mese: <input type="number" id="mese" min="1" max="12"></label>
    <label>Anno: <input type="number" id="anno" min="2020" max="2100"></label>
    <button onclick="caricaTurni()">Carica</button>
    <button onclick="salvaTurniManuale()" style="background:linear-gradient(135deg,#b2f0d0,#7de8b0); color:#2e7d52;">Salva 💾</button>
    <button onclick="pulisciTabella()" style="background-color:#dc3545; color:#fff;">Pulisci</button>
  </div>

  <div class="main-container">
    <div id="output" class="table-container"></div>
    
    <div class="legend-container">
      <h4 style="text-align:center; color:#2a4d7a;">Legenda Riepilogo</h4>
      <div id="legenda-operatori"></div>
      <button class="save-btn" style="background-color:#b80000; width:100%;" onclick="mostraStatisticheRepe()">Statistiche REPE annuali</button>
    </div>
  </div>

  <hr>

  <div class="actions-bottom">
    <button class="save-btn" onclick="generaAnteprimaBackup()">Genera Anteprima Backup</button>
    <button id="conferma-salvataggio-btn" class="save-btn" onclick="confermaSalvataggioBackup()" style="display: none; background-color: #28a745;">Conferma e Salva in Archivio</button>
    <button class="save-btn" onclick="toggleArchivio()" style="background-color: #6c757d;">Mostra/Nascondi Archivio</button>
  </div>

  <div id="preview-container"></div>
  <div id="archivio-container" style="display: none; margin-top: 20px; padding: 15px; border: 1px solid #ccc;">
    <h4>Archivio Turni</h4>
    <div id="archivio-preview"></div>
  </div>

  <div id="form-progetto-popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:10px; width:90%; max-width:500px; max-height:80vh; overflow-y:auto;">
      <h3 id="titolo-progetto">Dettagli Progetto</h3>
      <div id="progetto-inputs">
          <label>Ora Inizio: <input type="time" id="prog-inizio"></label>
          <label>Ora Fine: <input type="time" id="prog-fine"></label>
          <hr>
          <div id="lista-pazienti"></div>
          <button onclick="aggiungiPaziente()">+ Aggiungi Paziente</button>
      </div>
      <div style="margin-top:20px; text-align:right;">
        <button onclick="chiudiFormProgetto()">Annulla</button>
        <button onclick="salvaDatiProgetto()" style="background:#28a745; color:white;">Salva</button>
      </div>
    </div>
  </div>

  <script>
    const NOMI = ["MACALUSO", "DINOLFO", "NAPOLI", "VENTIMIGLIA"];
    const GIORNI_SETT = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
    const MESI_RR = [6, 7, 8, 9];
    let currentSelections = {};
    let currentTurniData = [];

    window.onload = () => {
      const d = new Date();
      document.getElementById('mese').value = d.getMonth() + 1;
      document.getElementById('anno').value = d.getFullYear();
      caricaTurni();
    };

    async function caricaTurni() {
      const m = document.getElementById('mese').value;
      const a = document.getElementById('anno').value;
      document.getElementById('loader-overlay').style.display = 'flex';
      
      try {
        const rStato = await fetch(`${APPSCRIPT_URL}?action=getStatoTurni&anno=${a}&mese=${m}`);
        currentSelections = await rStato.json() || {};
        
        const rTurni = await fetch(`${APPSCRIPT_URL}?action=getTurniMese&mese=${m}&anno=${a}`);
        currentTurniData = await rTurni.json();
        
        mostraTabella(currentTurniData, m, a);
      } catch (e) {
        console.error(e);
        alert("Errore nel caricamento dei dati.");
      } finally {
        document.getElementById('loader-overlay').style.display = 'none';
      }
    }

    function mostraTabella(turni, mese, anno) {
      const out = document.getElementById('output');
      const pasqua = getPasqua(anno);
      let html = `<table><tr><th>Giorno</th><th>Sett.</th>${NOMI.map(n => `<th>${n}</th>`).join('')}</tr>`;

      turni.forEach(t => {
        const data = new Date(anno, mese - 1, t.giorno);
        const isF = data.getDay() === 0 || isHoliday(data, pasqua);
        html += `<tr class="${isF ? 'festivo' : ''}">
          <td><b>${t.giorno}</b></td>
          <td>${GIORNI_SETT[data.getDay()].substring(0,3)}</td>`;
        
        NOMI.forEach(nome => {
          html += `<td>`;
          if (isF) {
            html += creaSelect(`festivo_${t.giorno}_${nome}`, ['REP']);
          } else {
            html += `<div class="cell-grid">
              <span>M</span>${creaSelect(`mattina_${t.giorno}_${nome}`, ['1','VA'])}
              <span>P</span>${creaSelect(`pomeriggio_${t.giorno}_${nome}`, ['2','PRO','VA'])}
              <span>N</span>${creaSelect(`notte_${t.giorno}_${nome}`, ['REP'])}
            </div>`;
          }
          html += `</td>`;
        });
        html += `</tr>`;
      });
      out.innerHTML = html + `</table>`;
      aggiornaLegenda();
    }

    function creaSelect(id, opzioni) {
        let opts = ['', 'F', 'RC'];
        if (MESI_RR.includes(Number(document.getElementById('mese').value))) opts.push('RR');
        opts = [...opts, ...opzioni];
        const val = currentSelections[id] || "";
        
        let s = `<select id="${id}" onchange="cambioTurno(this)" class="sel-${val}">`;
        [...new Set(opts)].forEach(o => {
            s += `<option value="${o}" ${o === val ? 'selected' : ''}>${o || '-'}</option>`;
        });
        return s + `</select>`;
    }

    function cambioTurno(s) {
        currentSelections[s.id] = s.value;
        s.className = `sel-${s.value}`;
        
        // Automazione Ferie/RC
        if (s.value === 'F' || s.value === 'RC') {
            const parts = s.id.split('_');
            if(parts[0] !== 'festivo') {
                ['mattina','pomeriggio','notte'].forEach(f => {
                    const el = document.getElementById(`${f}_${parts[1]}_${parts[2]}`);
                    if(el) { el.value = s.value; el.className = `sel-${s.value}`; currentSelections[el.id] = s.value; }
                });
            }
        }
        
        // Se è PRO, apri popup (opzionale o al click)
        if(s.value === 'PRO') {
            apriFormProgetto(s.id);
        }
        
        aggiornaLegenda();
    }

    function aggiornaLegenda() {
        let html = "";
        NOMI.forEach(nome => {
            const c = { VA:0, PRO:0, REP:0, RR:0, F:0, RC:0 };
            Object.entries(currentSelections).forEach(([id, val]) => {
                if(id.endsWith(nome) && val) {
                    if(c.hasOwnProperty(val)) c[val]++;
                }
            });
            html += `<div class="legend-operator">
                <strong>${nome}</strong><br>
                VA:${c.VA} | PRO:${c.PRO} | REP:${c.REP} | RR:${c.RR} | F/RC:${c.F + c.RC}
            </div>`;
        });
        document.getElementById('legenda-operatori').innerHTML = html;
    }

    async function salvaTurniManuale() {
        const m = document.getElementById('mese').value;
        const a = document.getElementById('anno').value;
        try {
            await fetch(APPSCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "salvaStatoTurni", anno: a, mese: m, stato: currentSelections })
            });
            alert("Turni salvati correttamente!");
        } catch(e) { alert("Errore nel salvataggio."); }
    }

    // --- FUNZIONI UTILI ---
    function getPasqua(a) {
        const f = Math.floor, g = a % 19, c = f(a / 100), h = (c - f(c / 4) - f((8 * c + 13) / 25) + 19 * g + 15) % 30;
        const i = h - f(h / 28) * (1 - f(h / 28) * f(29 / (h + 1)) * f((21 - g) / 11)), j = (a + f(a / 4) + i + 2 - c + f(c / 4)) % 7;
        const l = i - j, m = 3 + f((l + 40) / 44), d = l + 28 - 31 * f(m / 4);
        return new Date(a, m - 1, d);
    }

    function isHoliday(date, pasqua) {
        const g = date.getDate(), m = date.getMonth();
        const fisse = [{g:1,m:0},{g:6,m:0},{g:25,m:3},{g:1,m:4},{g:2,m:5},{g:15,m:7},{g:1,m:10},{g:8,m:11},{g:25,m:11},{g:26,m:11}];
        if (fisse.some(f => f.g === g && f.m === m)) return true;
        const pq = new Date(pasqua); pq.setDate(pq.getDate() + 1);
        return (g === pasqua.getDate() && m === pasqua.getMonth()) || (g === pq.getDate() && m === pq.getMonth());
    }

    // --- GESTIONE PROGETTI ---
    let progettoAttivoId = null;
    function apriFormProgetto(id) {
        progettoAttivoId = id;
        document.getElementById('form-progetto-popup').style.display = 'flex';
        document.getElementById('lista-pazienti').innerHTML = "";
        aggiungiPaziente();
    }
    function aggiungiPaziente() {
        const div = document.createElement('div');
        div.innerHTML = `<input type="text" placeholder="Nome Paziente"> <input type="text" placeholder="Cartella">`;
        document.getElementById('lista-pazienti').appendChild(div);
    }
    function chiudiFormProgetto() { document.getElementById('form-progetto-popup').style.display = 'none'; }
    function salvaDatiProgetto() {
        alert("Dati progetto registrati localmente. Saranno inviati al salvataggio.");
        chiudiFormProgetto();
    }

    // --- BACKUP ---
    function generaAnteprimaBackup() {
        const preview = document.getElementById('preview-container');
        preview.innerHTML = "<h3>Anteprima Backup Semplificata</h3><p>Verrà generata una tabella piatta per l'archivio.</p>";
        document.getElementById('conferma-salvataggio-btn').style.display = 'block';
    }
    function confermaSalvataggioBackup() {
        alert("Inviando i dati all'archivio Google Sheets...");
        document.getElementById('conferma-salvataggio-btn').style.display = 'none';
    }
    function toggleArchivio() {
        const c = document.getElementById('archivio-container');
        c.style.display = c.style.display === 'none' ? 'block' : 'none';
    }
  </script>
</body>
</html>
