<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Turni Pro</title>
  <style>
    :root {
      --bg-va: #b3d1ff; --text-va: #0a2377;
      --bg-pro: #b6ffd0; --text-pro: #006b2e;
      --bg-rep: #ffd6d6; --text-rep: #b80000;
      --bg-f: #e2e3e5; --text-f: #444;
      --bg-rr: #e040fb; --text-rr: #ffffff;
    }
    body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f7f6; font-size: 13px; }
    .header-controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        
    table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
    th, td { border: 1px solid #ddd; padding: 4px; text-align: center; }
    th { background: #f8f9fa; font-size: 11px; }
    .col-giorno { width: 40px; }

    .turno-container { display: flex; flex-direction: column; gap: 2px; }
    select { width: 100%; border: 1px solid #ccc; border-radius: 3px; font-size: 11px; height: 24px; text-align-last: center; }

    /* Classi Colori */
    .sel-VA { background: var(--bg-va); color: var(--text-va); font-weight: bold; }
    .sel-PRO { background: var(--bg-pro); color: var(--text-pro); font-weight: bold; }
    .sel-REP { background: var(--bg-rep); color: var(--text-rep); font-weight: bold; }
    .sel-F, .sel-RC { background: var(--bg-f); color: var(--text-f); }
    .sel-RR { background: var(--bg-rr); color: var(--text-rr); }

    .festivo { background: #ffebee; }
    .festivo td:first-child { color: red; font-weight: bold; }

    .btn-group { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
    button { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; font-size: 12px; }
    .btn-blue { background: #007bff; color: white; }
    .btn-green { background: #28a745; color: white; }
    .btn-orange { background: #fd7e14; color: white; }
        
    #legenda-operatori { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .card-legenda { background: white; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
    .card-legenda h4 { margin: 0 0 5px 0; border-bottom: 1px solid #eee; }
    .stat-item { font-size: 11px; color: #555; }
  </style>
</head>
<body>

  <div class="header-controls">
    <strong>Mese:</strong> <input type="number" id="mese" min="1" max="12" style="width:40px">
    <strong>Anno:</strong> <input type="number" id="anno" min="2020" max="2100" style="width:60px">
    <div class="btn-group">
      <button class="btn-blue" onclick="caricaTurni()">Carica</button>
      <button class="btn-green" onclick="salvaTurniManuale()">Salva 💾</button>
      <button class="btn-orange" onclick="generaAnteprimaBackup()">Backup/Anteprima</button>
    </div>
    <span id="feedback" style="margin-left:10px;color:#b80000;font-weight:bold;"></span>
  </div>

  <div id="output"></div>
  <div id="legenda-operatori"></div>
  <div id="preview-container"></div>

  <script src="main.js"></script>
</body>
</html>
